<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EECU Budget Calculator</title>
    <script type="module" src="app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sniglet:wght@400;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="app.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <header>
      <img src="imgs\eecuLogo 1.png" />
    </header>
    <main class="flex row">
      <section class="container left flex column">
        <!-- left section -->
        <nav #nav-bar class="nav flex row">
          <!-- use tect replacement css to make these look like buttons while retaining the semantic meaning of links and accessibility -->
          <a href="#" class="nav-link" id="career">Career</a>
          <hr class="line" />
          <a href="#" class="nav-link" id="edu">Education</a>
          <hr class="line" />
          <a href="#" class="nav-link" id="hous">Housing</a>
          <hr class="line" />
          <a href="#" class="nav-link" id="personal">Personal</a>
          <hr class="line" />
          <a href="#" class="nav-link" id="savings">Savings</a>
        </nav>

        <article class="career">
          <h2 class="categoryTitle">Career</h2> <!--This is your problem now API API API API-->
          <select id="occu"class="buttons">
            <option value="unanswered">Career Select</option>
          </select>
          <p id="salary">Salary: </p>
        </article>
        <article class="edu">
          <h2 class="categoryTitle">Education</h2>
          <div class="buttons">
            <input type="text" class="textInputs" placeholder="Supplies">
            <input type="text" class="textInputs" placeholder="Tuition">
            <input type="text" class="textInputs" placeholder="Student Loans">
          </div>
        </article>
        <article class="hous">
          <h2 class="categoryTitle">Housing</h2>
          <div class="buttons">
            <input type="text" class="textInputs" placeholder="Rent">
            <input type="text" class="textInputs" placeholder="Mortgage">
            <input type="text" class="textInputs" placeholder="Utilities">
            <input type="text" class="textInputs" placeholder="Groceries">
            <input type="text" class="textInputs" placeholder="Insurance">
          </div>
        </article>
        <article class="personal">
          <h2 class="categoryTitle">Personal</h2>
          <div class="buttons">
            <input type="text" class="textInputs" placeholder="Dining out">
            <input type="text" class="textInputs" placeholder="Gym">
            <input type="text" class="textInputs" placeholder="Streaming">
          </div>
        </article>
        <article class="savings">
          <h2 class="categoryTitle">Savings</h2>
          <div class="buttons">
            <input type="text" class="textInputs" placeholder="Savings">
            <input type="text" class="textInputs" placeholder="Investments" >
            <input type="text" class="textInputs" placeholder="Retirement" >
            
        </article>
      </section>
      <section class="container right flex column">
        <!-- right section -->
        <canvas id="doughnut"> </canvas>
      </section>
    </main>
  </body>
</html>
